<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset</title>
    <link rel="stylesheet" href="/styles/verify-email.css">
</head>
<body>
    <div class="verify-container">
        <div class="verify-card">
            <h2>Confirm Email to reset Password</h2>

            <form id="forget-form">
                <input type="email" name="email" class="forget-input" id="forget-email">
                <button type="submit" class="verify-btn" id="forget-btn">
                    Reset
                </button>
            </form>

        </div>
    </div>
    <script src="/scripts/utils/config.js"></script>
    <script src="/scripts/pages/forget-password.js"></script>

</body>
</html>
