<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset</title>
    <link rel="stylesheet" href="/styles/style.css">
</head>
<body>
    <main>
        <div class="sing-up-section">
            <img src="/assets/icons/crypt-logo.jpg" alt="">

            <div class="form-container">
                <h2>Confirm Email to reset Password</h2>
                <form id="login" >
                    <span>Email</span>
                     <input type="email" name="email" class="forget-input" id="forget-email">
                    <span>Confirm Password</span>
                    <input class="input" type="password" name="confirmPassword" placeholder="Enter Password" id="" required>
                     <button type="submit" class="verify-btn" id="forget-btn">
                        Reset
                    </button>
                </form>
            </div>
        </div>
    </div>
    <script src="/scripts/utils/config.js"></script>
    <script src="/scripts/pages/forget-password.js"></script>

</body>
</html>
